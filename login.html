<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MemoryRace — Login</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Rajdhani', sans-serif;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
    }

    @keyframes gridMove {
      0%   { transform: translateY(0); }
      100% { transform: translateY(60px); }
    }

    .bg-glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      opacity: 0.15;
    }
    .bg-glow-1 {
      width: 500px; height: 500px;
      background: cyan;
      top: -150px; left: -150px;
      animation: drift1 12s ease-in-out infinite alternate;
    }
    .bg-glow-2 {
      width: 400px; height: 400px;
      background: #7c3aed;
      bottom: -100px; right: -100px;
      animation: drift2 15s ease-in-out infinite alternate;
    }

    @keyframes drift1 {
      from { transform: translate(0, 0); }
      to   { transform: translate(80px, 80px); }
    }
    @keyframes drift2 {
      from { transform: translate(0, 0); }
      to   { transform: translate(-80px, -60px); }
    }

    .login-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 20px;
      animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-box {
      background: rgba(10, 10, 20, 0.85);
      border: 1px solid rgba(0, 255, 255, 0.2);
      border-radius: 20px;
      padding: 48px 40px;
      backdrop-filter: blur(20px);
      box-shadow:
        0 0 0 1px rgba(0,255,255,0.05),
        0 40px 80px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.05);
      position: relative;
      overflow: hidden;
    }

    .login-box::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, cyan, transparent);
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 72px; height: 72px;
      border-radius: 50%;
      border: 2px solid rgba(0,255,255,0.3);
      background: rgba(0,255,255,0.05);
      font-size: 2rem;
      margin-bottom: 16px;
      animation: iconPulse 3s ease-in-out infinite;
    }

    @keyframes iconPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0,255,255,0.3); }
      50%       { box-shadow: 0 0 0 12px rgba(0,255,255,0); }
    }

    .logo-title {
      font-family: 'Orbitron', monospace;
      font-size: 1.6rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.05em;
    }
    .logo-title span { color: cyan; text-shadow: 0 0 20px cyan; }

    .logo-sub {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 28px 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.08);
    }
    .divider span {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.1em;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: rgba(0,255,255,0.7);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 20px;
    }

    .input-wrap.has-toggle input { padding-right: 48px; }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(0,255,255,0.15);
      border-radius: 10px;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.1rem;
      font-weight: 400;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
      letter-spacing: 0.05em;
    }

    input::placeholder { color: rgba(255,255,255,0.2); }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: rgba(0,255,255,0.5);
      background: rgba(0,255,255,0.04);
      box-shadow: 0 0 0 3px rgba(0,255,255,0.08);
    }

    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(255,255,255,0.3);
      font-size: 1.1rem;
      padding: 4px;
      transition: color 0.2s;
      line-height: 1;
    }
    .toggle-pw:hover { color: cyan; }

    /* ── Regras de senha ── */
    .pw-rules {
      margin-top: -12px;
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .pw-rule {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.76rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.03em;
      transition: color 0.3s;
    }

    .pw-rule .rule-icon {
      font-size: 0.7rem;
      width: 16px;
      text-align: center;
      transition: all 0.3s;
    }

    /* Estado: regra satisfeita */
    .pw-rule.ok {
      color: cyan;
    }
    .pw-rule.ok .rule-icon {
      color: cyan;
      text-shadow: 0 0 8px cyan;
    }

    /* ── Barra de força ── */
    .strength-wrap {
      margin-top: -8px;
      margin-bottom: 20px;
    }

    .strength-label {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .strength-label span:last-child {
      font-weight: 600;
      transition: color 0.3s;
    }

    .strength-bar {
      height: 4px;
      border-radius: 4px;
      background: rgba(255,255,255,0.07);
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      border-radius: 4px;
      width: 0%;
      transition: width 0.4s ease, background 0.4s ease;
    }

    /* Cores da força */
    .strength-fill.fraca    { background: #ff4d4d; box-shadow: 0 0 6px #ff4d4d; }
    .strength-fill.media    { background: #ffaa00; box-shadow: 0 0 6px #ffaa00; }
    .strength-fill.boa      { background: #00e5ff; box-shadow: 0 0 6px #00e5ff; }
    .strength-fill.forte    { background: #00ff88; box-shadow: 0 0 8px #00ff88; }

    .btn-enter {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(0,255,255,0.9) 0%, rgba(0,180,255,0.9) 100%);
      color: #000;
      font-family: 'Orbitron', monospace;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn-enter::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    /* Botão desabilitado enquanto senha inválida */
    .btn-enter:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    .btn-enter:not(:disabled):hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,255,255,0.4);
    }
    .btn-enter:not(:disabled):hover::after { opacity: 1; }
    .btn-enter:not(:disabled):active { transform: translateY(0) scale(0.98); }

    .error-msg {
      min-height: 20px;
      font-size: 0.85rem;
      color: #ff6b6b;
      text-align: center;
      margin-top: 14px;
      letter-spacing: 0.03em;
    }

    .success-msg {
      min-height: 20px;
      font-size: 0.85rem;
      color: cyan;
      text-align: center;
      margin-top: 14px;
      letter-spacing: 0.03em;
      display: none;
    }

    .login-footer {
      text-align: center;
      margin-top: 28px;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.05em;
    }

    .cursor {
      position: fixed;
      width: 16px; height: 16px;
      background: rgba(0,255,255,0.25);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 15px cyan, 0 0 30px rgba(0,255,255,0.3);
      z-index: 9999;
    }

    @media (max-width: 480px) {
      .login-box { padding: 36px 24px; }
      .logo-title { font-size: 1.3rem; }
      .cursor { display: none; }
    }
  </style>
</head>
<body>

  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div class="cursor" id="cursor"></div>

  <div class="login-container">
    <div class="login-box">

      <div class="logo-wrap">
        <div class="logo-icon">🧠</div>
        <div class="logo-title"><span>Memory</span>Race</div>
        <div class="logo-sub">Teste sua memória</div>
      </div>

      <div class="divider"><span>identificação</span></div>

      <!-- Nome -->
      <label for="username">Seu nome</label>
      <div class="input-wrap">
        <input
          type="text"
          id="username"
          placeholder="Digite seu nome..."
          maxlength="20"
          autocomplete="off"
          autofocus
        />
      </div>

      <!-- Senha -->
      <label for="password">Sua senha</label>
      <div class="input-wrap has-toggle">
        <input
          type="password"
          id="password"
          placeholder="Digite sua senha..."
          maxlength="30"
          autocomplete="off"
        />
        <button class="toggle-pw" onclick="toggleSenha()" tabindex="-1" type="button">👁</button>
      </div>

      <!-- Regras visuais -->
      <div class="pw-rules">
        <div class="pw-rule" id="rule-len">
          <span class="rule-icon">○</span>
          <span>Mínimo 8 caracteres</span>
        </div>
        <div class="pw-rule" id="rule-letra">
          <span class="rule-icon">○</span>
          <span>Pelo menos 1 letra (a–z ou A–Z)</span>
        </div>
        <div class="pw-rule" id="rule-numero">
          <span class="rule-icon">○</span>
          <span>Pelo menos 1 número (0–9)</span>
        </div>
      </div>

      <!-- Barra de força -->
      <div class="strength-wrap">
        <div class="strength-label">
          <span>Força da senha</span>
          <span id="strength-text">—</span>
        </div>
        <div class="strength-bar">
          <div class="strength-fill" id="strength-fill"></div>
        </div>
      </div>

      <button class="btn-enter" id="btnEntrar" onclick="entrar()" disabled>ENTRAR NO JOGO</button>

      <div class="error-msg"   id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>

      <div class="login-footer">
        Seu progresso é salvo automaticamente
      </div>

    </div>
  </div>

  <script>
    // Cursor
    document.addEventListener("mousemove", e => {
      const c = document.getElementById("cursor");
      c.style.left = e.clientX + "px";
      c.style.top  = e.clientY + "px";
    });

    // Enter navega entre campos
    document.getElementById("username").addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("password").focus();
    });
    document.getElementById("password").addEventListener("keydown", e => {
      if (e.key === "Enter") entrar();
    });

    // Mostrar / ocultar senha
    function toggleSenha() {
      const campo = document.getElementById("password");
      campo.type  = campo.type === "password" ? "text" : "password";
    }

    // ─────────────────────────────────────────────────────
    // VALIDAÇÃO E FORÇA DA SENHA — atualiza em tempo real
    // ─────────────────────────────────────────────────────
    const senhaInput = document.getElementById("password");

    senhaInput.addEventListener("input", () => {
      const senha = senhaInput.value;
      atualizarRegras(senha);
      atualizarForca(senha);
    });

    function atualizarRegras(senha) {
      const temLen    = senha.length >= 8;
      const temLetra  = /[a-zA-Z]/.test(senha);
      const temNumero = /[0-9]/.test(senha);

      marcarRegra("rule-len",    temLen);
      marcarRegra("rule-letra",  temLetra);
      marcarRegra("rule-numero", temNumero);

      // Habilita o botão só quando todas as regras passam
      document.getElementById("btnEntrar").disabled = !(temLen && temLetra && temNumero);
    }

    function marcarRegra(id, ok) {
      const el   = document.getElementById(id);
      const icon = el.querySelector(".rule-icon");
      if (ok) {
        el.classList.add("ok");
        icon.textContent = "✔";
      } else {
        el.classList.remove("ok");
        icon.textContent = "○";
      }
    }

    function atualizarForca(senha) {
      // Critérios de força
      const temLen8      = senha.length >= 8;
      const temLen12     = senha.length >= 12;
      const temLetra     = /[a-zA-Z]/.test(senha);
      const temNumero    = /[0-9]/.test(senha);
      const temMaiuscula = /[A-Z]/.test(senha);
      const temEspecial  = /[^a-zA-Z0-9]/.test(senha);

      // Pontuação: cada critério vale 1 ponto
      let pontos = 0;
      if (temLetra)     pontos++;
      if (temNumero)    pontos++;
      if (temLen8)      pontos++;
      if (temMaiuscula) pontos++;
      if (temEspecial)  pontos++;
      if (temLen12)     pontos++;

      const fill = document.getElementById("strength-fill");
      const text = document.getElementById("strength-text");

      if (senha.length === 0) {
        fill.style.width = "0%";
        fill.className   = "strength-fill";
        text.textContent = "—";
        text.style.color = "rgba(255,255,255,0.25)";
        return;
      }

      // Mapeia pontuação para níveis
      if (pontos <= 1) {
        fill.style.width = "20%";
        fill.className   = "strength-fill fraca";
        text.textContent = "Muito fraca";
        text.style.color = "#ff4d4d";
      } else if (pontos <= 2) {
        fill.style.width = "40%";
        fill.className   = "strength-fill fraca";
        text.textContent = "Fraca";
        text.style.color = "#ff4d4d";
      } else if (pontos === 3) {
        fill.style.width = "60%";
        fill.className   = "strength-fill media";
        text.textContent = "Média";
        text.style.color = "#ffaa00";
      } else if (pontos === 4) {
        fill.style.width = "80%";
        fill.className   = "strength-fill boa";
        text.textContent = "Boa";
        text.style.color = "#00e5ff";
      } else {
        fill.style.width = "100%";
        fill.className   = "strength-fill forte";
        text.textContent = "Forte 🔒";
        text.style.color = "#00ff88";
      }
    }

    // ─────────────────────────────────────────────────────
    // BANCO DE USUÁRIOS
    //
    // "memoryrace_usuarios" → {
    //   "João||abc123": { sessionId, nome, criadoEm },
    //   "Maria||xyz789": { ... }
    // }
    // ─────────────────────────────────────────────────────

    function carregarUsuarios() {
      try { return JSON.parse(localStorage.getItem("memoryrace_usuarios")) || {}; }
      catch (e) { return {}; }
    }

    function salvarUsuarios(u) {
      localStorage.setItem("memoryrace_usuarios", JSON.stringify(u));
    }

    function gerarSessionId() {
      return "sess_" + Date.now() + "_" + Math.random().toString(36).slice(2, 9);
    }

    function entrar() {
      const nome  = document.getElementById("username").value.trim();
      const senha = document.getElementById("password").value.trim();

      // Validação do nome
      if (nome.length < 2)  { mostrarErro("Nome deve ter pelo menos 2 caracteres.");  return; }
      if (nome.length > 20) { mostrarErro("Nome deve ter no máximo 20 caracteres.");  return; }

      // Validação da senha (dupla confirmação — o botão já deveria estar bloqueado)
      if (senha.length < 8)        { mostrarErro("Senha deve ter pelo menos 8 caracteres."); return; }
      if (!/[a-zA-Z]/.test(senha)) { mostrarErro("A senha deve conter pelo menos uma letra."); return; }
      if (!/[0-9]/.test(senha))    { mostrarErro("A senha deve conter pelo menos um número."); return; }

      const chave    = nome + "||" + senha;
      const usuarios = carregarUsuarios();

      if (usuarios[chave]) {
        // Usuário existente — entra com progresso salvo
        const sessao = { nome: usuarios[chave].nome, sessionId: usuarios[chave].sessionId };
        localStorage.setItem("memoryrace_sessao_atual", JSON.stringify(sessao));
        window.location.href = "index.html";
      } else {
        // Novo usuário — cria conta
        const sessionId  = gerarSessionId();
        usuarios[chave]  = { sessionId, nome, criadoEm: Date.now() };
        salvarUsuarios(usuarios);

        const sessao = { nome, sessionId };
        localStorage.setItem("memoryrace_sessao_atual", JSON.stringify(sessao));
        localStorage.setItem("memoryrace_level_" + sessionId, 1);

        mostrarSucesso("✅ Conta criada! Entrando no jogo...");
        setTimeout(() => { window.location.href = "index.html"; }, 900);
      }
    }

    function mostrarErro(msg) {
      document.getElementById("successMsg").style.display = "none";
      const el = document.getElementById("errorMsg");
      el.textContent = msg;
      setTimeout(() => { el.textContent = ""; }, 3000);
    }

    function mostrarSucesso(msg) {
      document.getElementById("errorMsg").textContent = "";
      const el = document.getElementById("successMsg");
      el.textContent   = msg;
      el.style.display = "block";
    }
  </script>
</body>
</html>
