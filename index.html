<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MemoryRace</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Loading -->
  <div id="loading">Carregando...</div>

  <!-- Menu -->
  <div id="menu" style="display:none;">
    <h2>MemoryRace</h2>
    <p id="userWelcome"></p>
    <button onclick="startGame()">Jogar</button>
    <button onclick="logout()" class="logout-btn">Sair</button>
  </div>

  <!-- Canvas de fundo -->
  <canvas id="bg"></canvas>

  <!-- Cursor neon (só desktop) -->
  <div class="cursor" id="cursor"></div>

  <!-- Área de jogo — oculta até iniciar -->
  <div id="gameArea">
    <h1>MemoryRace</h1>
    <p id="status">Encontre os pares</p>
    <p id="ai"></p>

    <div class="info">
      <span id="time">Tempo: 00:00</span>
      <span id="score">Pontos: 0</span>
      <span id="best">—</span>
    </div>

    <div class="grid" id="grid"></div>
  </div>

  <!-- Tela de vitória -->
  <div id="winScreen">
    <h2>🏆 Você venceu!</h2>
    <p id="finalTime"></p>
    <p id="best-win"></p>
    <button onclick="nextLevel()" id="nextBtn">Próximo nível ➜</button>
    <button onclick="restartGame()" id="restartBtn" style="display:none; margin-top:10px;">Jogar Novamente 🎮</button>
  </div>

  <!-- Tela completa — nível ouro -->
  <div id="completeScreen">
    <h2>🏆 Parabéns! Você completou todas as fases!</h2>
    <p>Você é um mestre da memória!</p>
    <p id="completeFinalTime"></p>
    <p id="completeBest"></p>
    <button onclick="restartGame()">Jogar Novamente</button>
  </div>

  <script src="Scripts.js"></script>
</body>
</html>
