<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeuroMemory</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="loading">Carregando...</div>

<div id="menu">
  <h2>NeuroMemory</h2>
  <button onclick="startGame()">Jogar</button>
</div>

<canvas id="bg"></canvas>

<div class="cursor" id="cursor"></div>

<h1>NeuroMemory</h1>
<p id="status">Encontre os pares</p>

<p id="ai"></p>

<div class="info">
  <span id="time">Tempo: 0s</span>
  <span id="score">Pontos: 0</span>
</div>

<div class="grid" id="grid"></div>

<div id="winScreen">
  <h2>🏆 Você venceu!</h2>
  <p id="finalTime"></p>
  <p id="best"></p>
  <button onclick="nextLevel()" id="nextBtn">Próximo nível ➜</button>
  <button onclick="restartGame()" id="restartBtn" style="display:none; margin-top: 10px;">Jogar Novamente 🎮</button>
</div>

<div id="confetti-container"></div>

<script src="Scripts.js"></script>
</body>
</html>
